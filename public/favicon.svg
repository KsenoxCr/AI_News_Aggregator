<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Main newspaper body -->
  <rect x="2" y="4" width="20" height="24" rx="2" fill="#7C3AED"/>
  <!-- Folded right panel -->
  <rect x="19" y="7" width="11" height="19" rx="2" fill="#9333EA"/>

  <!-- Headline -->
  <rect x="5" y="8" width="12" height="2.5" rx="1" fill="white"/>
  <!-- Divider -->
  <rect x="5" y="12" width="12" height="0.75" rx="0.375" fill="white" opacity="0.35"/>
  <!-- Body lines -->
  <rect x="5" y="14"   width="12" height="1.5" rx="0.75" fill="white" opacity="0.75"/>
  <rect x="5" y="16.5" width="9"  height="1.5" rx="0.75" fill="white" opacity="0.75"/>
  <rect x="5" y="19"   width="11" height="1.5" rx="0.75" fill="white" opacity="0.75"/>
  <rect x="5" y="21.5" width="7"  height="1.5" rx="0.75" fill="white" opacity="0.75"/>

  <!-- Right panel lines -->
  <rect x="21" y="11" width="7" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="21" y="14" width="5" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="21" y="17" width="6" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="21" y="20" width="4" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
</svg>
